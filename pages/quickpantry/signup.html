<body>

<button

  <!-- ================= FIREBASE SCRIPT ================= -->

  <script type="module">

    import {

      collection,
      addDoc,
      getDocs,
      query,
      where

    }

    from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    import { db }
    from "/assets/config/quickpantry_config.js";

    // ================= ELEMENTS =================

    const studentNumber =
      document.getElementById("studentNumber");

    const studentName =
      document.getElementById("studentName");

    const studentYear =
      document.getElementById("studentYear");

    const studentCourse =
      document.getElementById("studentCourse");

    const message =
      document.getElementById("message");

    const submitBtn =
  document.getElementById("submitBtn");

   window.signUpStudent = async function () {

  const loadingOverlay =
    document.getElementById("loadingOverlay");

  const setLoading = (state) => {
    loadingOverlay.classList.toggle("hidden", !state);
  };

  const number = studentNumber.value.trim();
  const name = studentName.value.trim().toUpperCase();
  const year = studentYear.value.trim();
  const course = studentCourse.value.trim();

  // ================= VALIDATION =================
  if (!number || !name || !year || !course) {
    showMessage("❌ Please fill all fields", "error");
    return;
  }

const namePattern =
/^[A-Z]+(?:\s[A-Z]+)*,\s[A-Z]+(?:\s[A-Z]+)*(?:\s[A-Z]+)*(?:\s(JR\.|SR\.|III))?$/;

  if (!namePattern.test(name)) {
    showMessage("❌ Invalid name format", "error");
    return;
  }

  try {

    setLoading(true); // 🔥 SHOW SPINNER

    // ================= CHECK DUPLICATES =================
    const approvedSnap = await getDocs(
      query(collection(db, "students"), where("studentNumber", "==", number))
    );

    const pendingSnap = await getDocs(
      query(collection(db, "student_requests"), where("studentNumber", "==", number))
    );

    if (!approvedSnap.empty || !pendingSnap.empty) {
      setLoading(false);
      showMessage("❌ Student number already exists", "error");
      return;
    }

    const approvedNameSnap = await getDocs(
      query(collection(db, "students"), where("name", "==", name))
    );

    const pendingNameSnap = await getDocs(
      query(collection(db, "student_requests"), where("name", "==", name))
    );

    if (!approvedNameSnap.empty || !pendingNameSnap.empty) {
      setLoading(false);
      showMessage("❌ Student name already exists", "error");
      return;
    }

    // ================= SAVE REQUEST =================
    await addDoc(collection(db, "student_requests"), {
      studentNumber: number,
      name,
      year,
      course,
      status: "pending",
      createdAt: new Date()
    });

    setLoading(false); // 🔥 HIDE SPINNER

    showMessage("⏳ Submitted! Waiting for admin approval...", "success");

    studentNumber.value = "";
    studentName.value = "";
    studentYear.value = "";
    studentCourse.value = "";

  }

  catch (err) {
    console.error(err);
    setLoading(false);
    showMessage("❌ " + err.message, "error");
  }
};

function showMessage(text, type) {
  const message = document.getElementById("message");

  message.innerText = text;
  message.className = "message " + type;
}
  </script>

  <script>
(function () {
  function createDisclaimer() {
    if (document.getElementById("nameDisclaimer")) return;

    const div = document.createElement("div");
    div.id = "nameDisclaimer";

    div.innerHTML = `
      ⚠️ <b>NAME FORMAT RULE</b><br>
      Format: <b>SURNAME, FIRST NAME [SECOND NAME] [MIDDLE NAME] [JR./SR./III]</b><br><br>
      ✔ Example: DELA CRUZ, JUAN PABLO SANTOS JR.<br>
      ✔ Middle name is optional<br>
      ✔ Extension is optional<br>
      ❌ Must be CAPITAL LETTERS and include comma (,)
    `;

    div.style.cssText = `
      position: fixed;
      top: 20px;
      right: 20px;
      max-width: 320px;
      background: #fff3cd;
      color: #664d03;
      border: 1px solid #ffecb5;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      z-index: 99999;
      font-family: Arial, sans-serif;
    `;

    // Close button
    const closeBtn = document.createElement("button");
    closeBtn.textContent = "✖";
    closeBtn.style.cssText = `
      position: absolute;
      top: 6px;
      right: 8px;
      border: none;
      background: transparent;
      font-size: 14px;
      cursor: pointer;
    `;

    closeBtn.onclick = () => div.remove();

    div.appendChild(closeBtn);
    document.body.appendChild(div);
  }

  // Auto run
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", createDisclaimer);
  } else {
    createDisclaimer();
  }
})();

  </script>
